<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhotoDates (v.2.3)</title>
  <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    #results {
      margin-top: 20px;
      white-space: pre-line;
      font-family: monospace;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <h2>PhotoDates (v.2.3)</h2>

  <input type="file" id="folderPicker" webkitdirectory directory multiple>
  <p>Select a folder containing your photos.</p>

  <div id="results"></div>

  <script>
    document.getElementById("folderPicker").addEventListener("change", async (event) => {
      const files = [...event.target.files];

      // monthIndex → Set(days)
      const daysWithPhotos = Array.from({ length: 12 }, () => new Set());

      const possibleDateTags = [
        "DateTimeOriginal",
        "CreateDate",
        "DateCreated",
        "DateTimeDigitized"
      ];

      for (const file of files) {
        if (!file.name.toLowerCase().match(/\.(jpg|jpeg)$/)) continue;

        let foundDate = null;

        try {
          const arrayBuffer = await file.arrayBuffer();
          const tags = ExifReader.load(arrayBuffer);

          for (const tagName of possibleDateTags) {
            if (tags[tagName]) {
              const raw = tags[tagName].description.split(" ")[0];
              const [y, m, d] = raw.split(":");
              foundDate = new Date(`${y}-${m}-${d}`);
              break;
            }
          }
        } catch {}

        if (!foundDate) foundDate = new Date(file.lastModified);

        const monthIndex = foundDate.getMonth();
        const day = foundDate.getDate();

        daysWithPhotos[monthIndex].add(day);
      }

      const monthNames = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
      ];

      let output = "Missing dates:\n\n";

      for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
        const missing = [];

        for (let day = 1; day <= 31; day++) {
          const test = new Date(2024, monthIndex, day);
          if (test.getMonth() !== monthIndex) continue;

          if (!daysWithPhotos[monthIndex].has(day)) {
            const dd = String(day).padStart(2, "0");
            const mm = String(monthIndex + 1).padStart(2, "0");
            missing.push(`${dd}/${mm}`);
          }
        }

        if (missing.length > 0) {
          output += `${monthNames[monthIndex]}\n`;
          missing.forEach(line => output += `  ${line}\n`);
          output += "\n";
        }
      }

      document.getElementById("results").textContent = output.trim();
    });
  </script>

</body>
</html>
