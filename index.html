<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhotoDates (v.4)</title>
  <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    #results {
      margin-top: 20px;
      white-space: pre-line;
      font-family: monospace;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <h2 id="title">PhotoDates (v.5)</h2>

  <input type="file" id="folderPicker" webkitdirectory directory multiple>
  <p>Select a folder containing your photos.</p>

  <div id="results"></div>

  <script>

    // Format DD/MM only
    function formatDayMonth(day, monthIndex) {
      const dd = String(day).padStart(2, "0");
      const mm = String(monthIndex + 1).padStart(2, "0");
      return `${dd}/${mm}`;
    }

    document.getElementById("folderPicker").addEventListener("change", async (event) => {
      const files = [...event.target.files];

      // monthIndex -> Set of days that have at least one photo (ignoring year)
      const daysWithPhotos = Array.from({ length: 12 }, () => new Set());

      for (const file of files) {
        if (!file.name.toLowerCase().match(/\.(jpg|jpeg)$/)) continue;

        try {
          const arrayBuffer = await file.arrayBuffer();
          const tags = ExifReader.load(arrayBuffer);

          const tag =
            tags.DateTimeOriginal ||
            tags.DateCreated ||
            tags.CreateDate ||
            tags.DateTimeDigitized;

          if (tag) {
            const dateStr = tag.description.split(" ")[0];
            const [year, month, day] = dateStr.split(":");
            const date = new Date(`${year}-${month}-${day}`);
            const m = date.getMonth();
            const d = date.getDate();
            daysWithPhotos[m].add(d);
            continue;
          }
        } catch (err) {
          console.log("Error reading EXIF:", err);
        }

        // Fallback to file modified date if EXIF not present
        try {
          const fallback = new Date(file.lastModified);
          if (!isNaN(fallback)) {
            const m = fallback.getMonth();
            const d = fallback.getDate();
            daysWithPhotos[m].add(d);
          }
        } catch (e) {}
      }

      // If no photos at all
      const anyPhotos = daysWithPhotos.some(s => s.size > 0);
      if (!anyPhotos) {
        document.getElementById("results").textContent = "No photo dates found in this folder.";
        return;
      }

      const monthNames = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
      ];

      // Build output: for each month, list days that do NOT appear in daysWithPhotos[month]
      let output = "Missing dates (day/month only):\n\n";

      for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
        const missing = [];

        // Determine number of days in this month using a non-leap template year (2024 is leap; use 2021 to be safe)
        const daysInMonth = new Date(2021, monthIndex + 1, 0).getDate();

        for (let day = 1; day <= daysInMonth; day++) {
          if (!daysWithPhotos[monthIndex].has(day)) {
            missing.push(formatDayMonth(day, monthIndex));
          }
        }

        if (missing.length > 0) {
          output += `${monthNames[monthIndex]}\n`;
          missing.forEach(line => output += `  ${line}\n`);
          output += "\n";
        }
      }

      document.getElementById("results").textContent = output.trim();
    });
  </script>

</body>
</html>
