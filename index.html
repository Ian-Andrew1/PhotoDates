<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhotoDates (v.3)</title>
  <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    #results {
      margin-top: 20px;
      white-space: pre-line;
      font-family: monospace;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <h2 id="title">PhotoDates (v.3)</h2>

  <input type="file" id="folderPicker" webkitdirectory directory multiple>
  <p>Select a folder containing your photos.</p>

  <div id="results"></div>

  <script>
    // Format DD/MM (Weekday)
    function formatDayMonth(day, monthIndex) {
      const fakeYear = 2024; // leap year for Feb 29
      const d = new Date(fakeYear, monthIndex, day);
      const weekday = d.toLocaleDateString("en-GB", { weekday: "long" });

      const dd = String(day).padStart(2, "0");
      const mm = String(monthIndex + 1).padStart(2, "0");

      return `${dd}/${mm} (${weekday})`;
    }

    document.getElementById("folderPicker").addEventListener("change", async (event) => {
      const files = [...event.target.files];
      const photoDays = Array.from({ length: 12 }, () => new Set());

      for (const file of files) {
        if (!file.name.toLowerCase().match(/\.(jpg|jpeg)$/)) continue;

        try {
          const arrayBuffer = await file.arrayBuffer();
          const tags = ExifReader.load(arrayBuffer);

          const tag =
            tags.DateTimeOriginal ||
            tags.DateCreated ||
            tags.CreateDate ||
            tags.DateTimeDigitized;

          if (tag) {
            const dateStr = tag.description.split(" ")[0];
            const [year, month, day] = dateStr.split(":");
            const d = new Date(`${year}-${month}-${day}`);

            const monthIndex = d.getMonth();
            const dayNum = d.getDate();

            photoDays[monthIndex].add(dayNum);
          }
        } catch (err) {
          console.log("EXIF error:", err);
        }
      }

      // Title stays fixed
      document.title = "PhotoDates (v.3)";
      document.getElementById("title").textContent = "PhotoDates (v.3)";

      const monthNames = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
      ];

      let output = "Missing dates:\n\n";

      for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
        const missing = [];

        for (let day = 1; day <= 31; day++) {
          const test = new Date(2024, monthIndex, day);
          if (test.getMonth() !== monthIndex) continue;

          if (!photoDays[monthIndex].has(day)) {
            missing.push(formatDayMonth(day, monthIndex));
          }
        }

        if (missing.length > 0) {
          output += `${monthNames[monthIndex]}\n`;
          missing.forEach(line => output += `  ${line}\n`);
          output += "\n";
        }
      }

      document.getElementById("results").textContent = output.trim();
    });
  </script>

</body>
</html>
