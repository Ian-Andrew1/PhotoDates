<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhotoDates (v.3)</title>
  <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    #results {
      margin-top: 20px;
      white-space: pre-line;
      font-family: monospace;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <h2 id="title">PhotoDates (v.3)</h2>

  <input type="file" id="folderPicker" webkitdirectory directory multiple>
  <p>Select a folder containing your photos.</p>

  <div id="results"></div>

  <script>

    // NEW: Format DD/MM only
    function formatDayMonth(iso) {
      const d = new Date(iso);
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      return `${dd}/${mm}`;
    }

    document.getElementById("folderPicker").addEventListener("change", async (event) => {
      const files = [...event.target.files];
      const photoDates = new Set();

      for (const file of files) {
        if (!file.name.toLowerCase().match(/\.(jpg|jpeg)$/)) continue;

        try {
          const arrayBuffer = await file.arrayBuffer();
          const tags = ExifReader.load(arrayBuffer);

          const tag =
            tags.DateTimeOriginal ||
            tags.DateCreated ||
            tags.CreateDate ||
            tags.DateTimeDigitized;

          if (tag) {
            const dateStr = tag.description.split(" ")[0];
            const [year, month, day] = dateStr.split(":");
            const date = new Date(`${year}-${month}-${day}`);
            photoDates.add(date.toISOString().split("T")[0]);
          }
        } catch (err) {
          console.log("Error reading EXIF:", err);
        }
      }

      if (photoDates.size === 0) {
        document.getElementById("results").textContent = "No EXIF dates found in this folder.";
        return;
      }

      const sorted = [...photoDates].sort();
      const start = new Date(sorted[0]);
      const end = new Date(sorted[sorted.length - 1]);

      // Title stays fixed
      document.title = `PhotoDates (v.3)`;
      document.getElementById("title").textContent = `PhotoDates (v.3)`;

      const missing = [];
      let current = new Date(start);

      while (current <= end) {
        const iso = current.toISOString().split("T")[0];
        if (!photoDates.has(iso)) missing.push(iso);
        current.setDate(current.getDate() + 1);
      }

      // --- NEW: Group by month only, ignore year completely ---
      const grouped = {};

      missing.forEach(iso => {
        const d = new Date(iso);
        const monthName = d.toLocaleString("en-GB", { month: "long" });
        const key = `${d.getMonth()}-${d.getDate()}`; // month-day pair

        if (!grouped[monthName]) grouped[monthName] = new Set();
        grouped[monthName].add(formatDayMonth(iso)); // DD/MM only
      });
