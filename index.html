<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhotoDates (v.4)</title>
  <script src="https://cdn.jsdelivr.net/npm/exifreader/dist/exif-reader.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    #results {
      margin-top: 20px;
      white-space: pre-line;
      font-family: monospace;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <h2 id="title">PhotoDates (v.4)</h2>

  <input type="file" id="folderPicker" webkitdirectory directory multiple>
  <p>Select a folder containing your photos.</p>

  <div id="results"></div>

  <script>
    // Format date as DD/MM (Weekday)
    function formatCalendarDate(day, monthIndex) {
      const fakeYear = 2024; // leap year to allow 29 Feb
      const d = new Date(fakeYear, monthIndex, day);
      const weekday = d.toLocaleDateString("en-GB", { weekday: "long" });

      const dd = String(day).padStart(2, "0");
      const mm = String(monthIndex + 1).padStart(2, "0");

      return `${dd}/${mm} (${weekday})`;
    }

    // EXIF date fields to check
    const possibleDateTags = [
      "DateTimeOriginal",
      "CreateDate",
      "DateCreated",
      "DateTimeDigitized",
      "ModifyDate",
      "DateTime",
      "MediaCreateDate",
      "MediaModifyDate",
      "TrackCreateDate",
      "TrackModifyDate",
      "ContentCreateDate",
      "GPSDateStamp"
    ];

    document.getElementById("folderPicker").addEventListener("change", async (event) => {
      const files = [...event.target.files];

      // Store days that HAVE photos: monthIndex → Set(days)
      const daysWithPhotos = Array.from({ length: 12 }, () => new Set());

      for (const file of files) {
        if (!file.name.toLowerCase().match(/\.(jpg|jpeg)$/)) continue;

        let foundDate = null;

        try {
          const arrayBuffer = await file.arrayBuffer();
          const tags = ExifReader.load(arrayBuffer);

          for (const tagName of possibleDateTags) {
            if (tags[tagName]) {
              const raw = tags[tagName].description.split(" ")[0];
              const parts = raw.split(/[:\/]/);

              if (parts.length >= 3) {
                const [y, m, d] = parts;
                foundDate = new Date(`${y}-${m}-${d}`);
                break;
              }
            }
          }
        } catch (err) {
          console.log("EXIF error:", err);
        }
