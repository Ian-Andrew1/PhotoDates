<html>

      white-space: pre-line;
      font-family: monospace;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <h2>PhotoDates (v.2.2)</h2>

  <input type="file" id="folderPicker" webkitdirectory directory multiple>
  <p>Select a folder containing your photos.</p>

  <div id="results"></div>

    // Format DD/MM (no weekday, no year)
    function formatDayMonth(iso) {
      const d = new Date(iso);
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      return `${dd}/${mm}`;
    }

    document.getElementById("folderPicker").addEventListener("change", async (event) => {
      const files = [...event.target.files];
      const photoDates = new Set();

      // EXIF fields (from Version A — the one that worked)
      const possibleDateTags = [
        "DateTimeOriginal",
        "CreateDate",
        "DateCreated",
        "DateTimeDigitized"
      ];

      // Read EXIF dates exactly as in Version A
      for (const file of files) {
        if (!file.name.toLowerCase().match(/\.(jpg|jpeg)$/)) continue;

        let foundDate = null;

        try {
          const arrayBuffer = await file.arrayBuffer();
          const tags = ExifReader.load(arrayBuffer);

          for (const tagName of possibleDateTags) {
            if (tags[tagName]) {
              const raw = tags[tagName].description.split(" ")[0];
              const [y, m, d] = raw.split(":");
              foundDate = new Date(`${y}-${m}-${d}`);
              break;
            }
          }
        } catch {}

        if (!foundDate) foundDate = new Date(file.lastModified);

        const iso = foundDate.toISOString().split("T")[0];
        photoDates.add(iso);
      }

      if (photoDates.size === 0) {
        document.getElementById("results").textContent =
          "No EXIF dates found in this folder.";
        return;
      }
