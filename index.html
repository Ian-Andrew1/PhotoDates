<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhotoDates (v.3)</title>
  <script src="https://cdn.jsdelivr.net/npm/exifreader/dist/exif-reader.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    #results {
      margin-top: 20px;
      white-space: pre-line;
      font-family: monospace;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <h2 id="title">PhotoDates (v.3)</h2>

  <input type="file" id="folderPicker" webkitdirectory directory multiple>
  <p>Select a folder containing your photos.</p>

  <div id="results"></div>

  <script>
    function formatCalendarDate(iso) {
      const d = new Date(iso);
      const day = d.toLocaleDateString("en-GB", { weekday: "long" });
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${mm}-${dd} (${day})`;
    }

    document.getElementById("folderPicker").addEventListener("change", async (event) => {
      const files = [...event.target.files];
      const photoDates = new Set();

      for (const file of files) {
        if (!file.name.toLowerCase().match(/\.(jpg|jpeg)$/)) continue;

        try {
          const arrayBuffer = await file.arrayBuffer();
          const tags = ExifReader.load(arrayBuffer);

          const tag =
            tags.DateTimeOriginal ||
            tags.DateCreated ||
            tags.CreateDate ||
            tags.DateTimeDigitized;

          if (tag) {
            const dateStr = tag.description.split(" ")[0];
            const [year, month, day] = dateStr.split(":");
            const date = new Date(`${year}-${month}-${day}`);
            photoDates.add(date.toISOString().split("T")[0]);
          }
        } catch (err) {
          console.log("Error reading EXIF:", err);
        }
      }

      if (photoDates.size === 0) {
        document.getElementById("results").textContent =
          "No EXIF dates found in this folder.";
        return;
      }

      const sorted = [...photoDates].sort();
      const start = new Date(sorted[0]);
      const end = new Date(sorted[sorted.length - 1]);

      // Update title
      const firstDate = sorted[0];
      document.title = `PhotoDates (v.3) — from ${firstDate}`;
      document.getElementById("title").textContent =
        `PhotoDates (v.3) — from ${firstDate}`;

      // Build missing date list
      const missing = [];
      let current = new Date(start);

      while (current <= end) {
        const iso = current.toISOString().split("T")[0];
        if (!photoDates.has(iso)) missing.push(iso);
        current.setDate(current.getDate() + 1);
      }

      // Group by month only
      const grouped = {};
      missing.forEach(iso => {
        const d = new Date(iso);
        const month = d.toLocaleString("en-GB", { month: "long" });

        if (!grouped[month]) grouped[month] = [];
        grouped[month].push(formatCalendarDate(iso));
      });

      // Build output
      let output = "Missing dates:\n\n";

      Object.keys(grouped).forEach(month => {
        output += `${month}\n`;
        grouped[month].forEach(line => {
          output += `  ${line}\n`;
        });
        output += "\n";
      });

      document.getElementById("results").textContent = output.trim();
    });
  </script>

</body>
</html>
