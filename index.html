<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhotoDates (v.3)</title>
  <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>

  <style>
    body {
      background: #f4f1e8; /* parchment */
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 40px;
    }

    h2 {
      font-family: "Courier New", Courier, monospace;
      font-size: 22px;
      margin-bottom: 20px;
    }

    /* Retro button (same style family as CheekyCommentApp) */
    #folderPickerLabel {
      display: inline-block;
      padding: 14px 28px;
      background: radial-gradient(circle, #d4b48c 0%, #a67c52 70%);
      border: 4px solid #3b2f2f;
      border-radius: 10px;
      box-shadow: 0 6px #3b2f2f, 0 10px 18px rgba(0,0,0,0.3);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.1s ease-in-out;
      text-align: center;
      user-select: none;
    }

    #folderPickerLabel:active {
      box-shadow: 0 3px #3b2f2f;
      transform: translateY(3px);
    }

    /* Hide the actual input */
    #folderPicker {
      display: none;
    }

    /* Results box styled like CheekyComment output */
    #results {
      margin-top: 40px;
      font-family: "Courier New", Courier, monospace;
      font-size: 15px;
      background: #ffffffd0;
      border: 1px solid #c8c2b8;
      border-radius: 4px;
      padding: 20px;
      width: 320px;
      min-height: 200px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

  <h2 id="title">PhotoDates (v.3)</h2>

  <!-- Styled button that triggers the hidden folder picker -->
  <label id="folderPickerLabel" for="folderPicker">SELECT PHOTO FOLDER</label>
  <input type="file" id="folderPicker" webkitdirectory directory multiple>

  <div id="results">Waiting for folder selection…</div>

  <script>

    function formatDayMonth(iso) {
      const d = new Date(iso);
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      return `${dd}/${mm}`;
    }

    document.getElementById("folderPicker").addEventListener("change", async (event) => {
      const files = [...event.target.files];
      const photoDates = new Set();

      for (const file of files) {
        if (!file.name.toLowerCase().match(/\.(jpg|jpeg)$/)) continue;

        try {
          const arrayBuffer = await file.arrayBuffer();
          const tags = ExifReader.load(arrayBuffer);

          const tag =
            tags.DateTimeOriginal ||
            tags.DateCreated ||
            tags.CreateDate ||
            tags.DateTimeDigitized;

          if (tag) {
            const dateStr = tag.description.split(" ")[0];
            const [year, month, day] = dateStr.split(":");
            const date = new Date(`${year}-${month}-${day}`);
            photoDates.add(date.toISOString().split("T")[0]);
          }
        } catch (err) {
          console.log("Error reading EXIF:", err);
        }
      }

      if (photoDates.size === 0) {
        document.getElementById("results").textContent =
          "No EXIF dates found in this folder.";
        return;
      }

      const sorted = [...photoDates].sort();
      const start = new Date(sorted[0]);
      const end = new Date(sorted[sorted.length - 1]);

      document.title = `PhotoDates (v.3)`;
      document.getElementById("title").textContent = `PhotoDates (v.3)`;

      const missing = [];
      let current = new Date(start);

      while (current <= end) {
        const iso = current.toISOString().split("T")[0];
        if (!photoDates.has(iso)) missing.push(iso);
        current.setDate(current.getDate() + 1);
      }

      const grouped = {};

      missing.forEach(iso => {
        const d = new Date(iso);
